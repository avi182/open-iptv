  </defs>
  <rect width="32" height="32" rx="7" fill="#0a0a0f"/>
  <text x="16" y="22" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="15" fill="white">F</text>
  <text x="16" y="22" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="15" fill="url(#g)" opacity="0.7">F</text>
  <circle cx="25" cy="7" r="3" fill="url(#g)"/>
